<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d6efd" />
    <title>QQ Lite for KaiOS</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" id="app">
      <header class="topbar">
        <h1 class="title">QQ Lite</h1>
        <p class="status" id="status">未连接</p>
      </header>

      <section class="content">
        <aside class="panel contacts-panel">
          <h2 class="panel-title">联系人</h2>
          <ul class="focus-list" id="contactList" aria-label="联系人列表"></ul>
        </aside>

        <section class="panel chat-panel">
          <h2 class="panel-title" id="chatTitle">会话</h2>
          <div class="messages" id="messageList" aria-live="polite"></div>
          <form class="composer" id="composerForm">
            <input id="messageInput" type="text" maxlength="200" placeholder="输入消息..." autocomplete="off" />
          </form>
        </section>
      </section>

      <footer class="softkeybar">
        <span id="softLeftLabel">菜单</span>
        <span id="softCenterLabel">选择</span>
        <span id="softRightLabel">返回</span>
      </footer>
    </main>

    <div id="menuLayer" class="menu-layer hidden" aria-hidden="true">
      <div class="menu-box">
        <h3 class="menu-title">菜单</h3>
        <ul id="menuList" class="menu-list" aria-label="菜单"></ul>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
